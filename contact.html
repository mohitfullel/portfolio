<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Mohit Fullel</title>
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="nav.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #d4a017;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .contact-title {
            margin-top: 100px; /* Space for Navbar */
            font-size: 40px;
            text-transform: uppercase;
            text-decoration: underline;
        }

        .form-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            margin: 30px auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            text-align: left; /* Keeps labels aligned left inside the centered box */
        }

        input[type="text"], 
        input[type="email"], 
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box; /* Crucial for mobile sizing */
        }

        .my-button {
            background-color: #000;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.3s;
        }

        .my-button:hover {
            background-color: #333;
        }

        .social-links a {
            color: black;
            font-weight: bold;
            text-decoration: none;
            margin: 0 10px;
        }

        /* MOBILE FIX */
        @media screen and (max-width: 480px) {
            .contact-title {
                font-size: 30px;
            }
            .form-box {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

  <label>Your Name:</label>
  <input type="text" name="name" required placeholder="your name">

<button type="submit" class="submit-btn">Submit</button>
</form>
