<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Hobbies | Mohit Fullel</title>
    <link rel="stylesheet" href="hobbies.css">
    <link rel="stylesheet" href="nav.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #d4a017;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .title {
            font-size: 60px;
            font-weight: 900;
            margin-top: 80px; 
            text-transform: uppercase;
        }

        .hobbies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1100px;
            margin: 40px auto;
        }

        .hobby-card {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            background: #000;
            height: 200px;
            display: block;
        }

        .hobby-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.3s;
        }

        .label {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: #90ee90; 
            font-size: 22px;
            font-weight: bold;
            text-transform: lowercase;
            pointer-events: none; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .hobby-card:hover img {
            transform: scale(1.1);
            filter: brightness(0.6);
        }

        /* MOBILE RESPONSIVE FIX */
        @media screen and (max-width: 600px) {
            .title {
                font-size: 40px;
            }
            .hobbies-grid {
                grid-template-columns: 1fr; /* Stacks cards in one column */
                width: 95%;
            }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="index.html">HOME</a>
        <a href="skills.html">SKILLS</a>
        <a href="hobbies.html" style="color: #d4a017;">HOBBIES</a>
        <a href="contact.html">CONTACT</a>
    </div>

    <h1 class="title">My Hobbies</h1>

    <div class="hobbies-grid">
        <a href="drawings.html" class="hobby-card">
            <img src="images/megumi.png" alt="Drawing">
            <div class="label">drawing</div>
        </a>

        <div class="hobby-card">
            <img src="images/minecraft.png" alt="Minecraft">
            <div class="label">minecraft</div>
        </div>

        <div class="hobby-card">
            <img src="images/music.png" alt="Music">
            <div class="label">music</div>
        </div>

        <div class="hobby-card">
            <img src="images/ccandam.jpg" alt="Editing">
            <div class="label" style="font-size: 18px;">editing videos</div>
        </div>

        <div class="hobby-card">
            <img src="images/Screenshot 2026-04-08 160840.png" alt="Web Design">
            <div class="label">web designing</div>
        </div>

        <div class="hobby-card">
            <img src="images/Screenshot 2026-04-08 161227.png" alt="Anime">
            <div class="label">anime</div>
        </div>
    </div>

    <a href="index.html" style="display: inline-block; margin: 40px 0; color: black; font-weight: bold; text-decoration: none; border-bottom: 2px solid black;">
        BACK TO HOME
    </a>

</body>
</html>
