    <style>
        .name-header {
            font-size: 75px;
            font-weight: 900;
            margin: 0;
            line-height: 0.85;
            text-transform: uppercase;   
            background: linear-gradient(to right, #000 60%, #6b6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gray-frame {

        }

        }
        .social-icons img {
            width: 40px;
            margin: 0 8px;
            transition: transform 0.2s;
        }
        .social-icons img:hover { transform: scale(1.2); }
    </style>

        </div>

        <div class="right-content fade-in" style="animation-delay: 0.3s;">

                <img src="images/mohitinsta.jpg" alt="Mohit" style="width: 100%; max-width: 320px; border-radius: 20px; display: block;">
