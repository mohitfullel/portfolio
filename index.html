<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Mohit Fullel | Portfolio</title>
    
    <link rel="stylesheet" href="about.css">
    <link rel="stylesheet" href="nav.css">

    <style>
        .name-header {
            font-size: 75px;
            font-weight: 900;
            margin: 0;
            line-height: 0.85;
            text-transform: uppercase;   
            background: linear-gradient(to right, #000 60%, #6b6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gray-frame {
            background-color: #4a4a4a;
            padding: 25px;
            border-radius: 40px;
        }
        .social-pill {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid #ffffff;
            border-radius: 50px;
            padding: 12px 30px;
        }
        .social-icons img {
            width: 40px;
            margin: 0 8px;
            transition: transform 0.2s;
        }
        .social-icons img:hover { transform: scale(1.2); }

        /* MOBILE FIXES */
        @media screen and (max-width: 600px) {
            .name-header {
                font-size: 50px; /* Smaller text so it fits on phone */
            }
            .main-container {
                display: block; /* Stacks the name on top of the photo */
                padding-top: 80px; /* Space for the navbar */
            }
            .left-content, .right-content {
                width: 100%;
                text-align: center;
            }
            .gray-frame {
                margin: 20px auto;
                padding: 15px;
            }
        }
    </style>
</head>
<body style="margin: 0; padding: 0;">

    <div class="navbar">
        <a href="index.html" style="color: #d4a017;">HOME</a>
        <a href="skills.html">SKILLS</a>
        <a href="hobbies.html">HOBBIES</a>
        <a href="contact.html">CONTACT</a>
    </div>

    <div class="main-container" style="padding-top: 70px;">
        
        <div class="left-content fade-in">
            <h3 style="margin: 0; font-size: 30px;">Hi everyone, my name is</h3>
            <h1 class="name-header">MOHIT<br>FULLEL</h1>
            <p style="font-size: 1.2rem; font-weight: 600; margin-top: 20px;">
                I'm a creative student who loves to draw, edit videos, and transform concepts into captivating visual content.
            </p>
        </div>

        <div class="right-content fade-in" style="animation-delay: 0.3s;">
            <div class="gray-frame">
                <img src="images/mohitinsta.jpg" alt="Mohit" style="width: 100%; max-width: 320px; border-radius: 20px; display: block; margin: 0 auto;">
            </div>

            <div class="social-pill">
                <p style="margin: 0 0 8px 0; font-weight: 800;">my social media</p>
                <div class="social-icons">
                    <a href="https://instagram.com/mohit_fullel" target="_blank"><img src="images/Instagram_Logo-removebg-preview.png"></a>
                    <a href="https://facebook.com" target="_blank"><img src="images/facebook.png"></a>
                    <a href="https://tiktok.com" target="_blank"><img src="images/tiktok logo.jpg"></a>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
