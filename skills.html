<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Skills | Mohit Fullel</title>
    <link rel="stylesheet" href="skills.css">
    
    <style>
        .big-text {
            font-size: 100px;
            color: #1a1a1a;
            line-height: 0.9;
            text-transform: uppercase;
            margin: 0;
        }

        .skill-btn {
            background-color: #ffffff;
            color: #2ecc71; 
            text-decoration: none;
            font-size: 40px;
            padding: 20px 40px;
            border-radius: 25px;
            text-align: center;
            display: block;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .skill-btn:hover {
            transform: scale(1.05);
            background-color: #f0f0f0;
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
        }

        .home-link {
            position: fixed;
            bottom: 30px;
            right: 30px;
            text-decoration: none;
            color: #1a1a1a;
            font-weight: bold;
            font-family: sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 10px 20px;
            border-bottom: 2px solid #2ecc71;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            color: #2ecc71;
            background: rgba(46, 204, 113, 0.1);
            border-radius: 5px;
        }

        .fade-slide {
            opacity: 0;
            animation: slideIn 0.6s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <div class="skills-container">
        <div class="left-title">
            <h1 class="big-text" style="letter-spacing: -5px;">MY<br>SKILLS</h1> 
        </div>

        <div class="right-buttons">
            <a href="drawings.html" class="skill-btn fade-slide" style="animation-delay: 0.1s;">DRAWING</a>
            
            <a href="edits.html" class="skill-btn fade-slide" style="animation-delay: 0.2s; font-size: 32px;">
               edits
            </a>
            
            <a href="index.html" class="skill-btn fade-slide" style="animation-delay: 0.3s;">html and css</a>
        </div>
    </div>

    <a href="index.html" class="home-link">Back to Home</a>

</body>
</html>
